<style>
  @keyframes pulse-dot { 0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(23, 201, 100, 0.4); } 50% { opacity:.4; box-shadow: 0 0 0 6px rgba(23, 201, 100, 0); } }
  .pulse { animation: pulse-dot 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  
  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-enter { animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
  
  @keyframes shimmer {
    0% { background-position: -1000px 0; }
    100% { background-position: 1000px 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, #131C31 25%, #1B2540 50%, #131C31 75%);
    background-size: 1000px 100%;
    animation: shimmer 2s infinite linear;
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);

  Chart.defaults.font.family = 'JetBrains Mono, monospace';

  const webcamBtn = document.getElementById('webcam-btn');
  const uploadBtn = document.getElementById('upload-btn');
  const driveBtn = document.getElementById('drive-btn');

  function attachRipples() {
    document.querySelectorAll('.btn-ripple').forEach(btn => {
      btn.addEventListener('mousedown', function(e) {
        if(btn.disabled) return;
        const circle = document.createElement('span');
        const diameter = Math.max(btn.clientWidth, btn.clientHeight);
        const radius = diameter / 2;
        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${e.clientX - btn.getBoundingClientRect().left - radius}px`;
        circle.style.top = `${e.clientY - btn.getBoundingClientRect().top - radius}px`;
        circle.classList.add('ripple');
        const existing = btn.querySelector('.ripple');
        if (existing) existing.remove();
        btn.appendChild(circle);
      });
    });
  }

  function attachTilt() {
    document.querySelectorAll('.tilt-card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const rotateX = ((y - centerY) / centerY) * -3;
        const rotateY = ((x - centerX) / centerX) * 3;
        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.01, 1.01, 1.01)`;
      });
      card.addEventListener('mouseleave', () => {
        card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
      });
    });
  }

  function playAlertSound() {
    const now = Date.now();
    if (now - lastSoundTime < 4000) return;
    lastSoundTime = now;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
  }

  function showToast(title, message) {
    const toast = document.createElement('div');
    toast.className = 'bg-white text-slate-800 p-4 rounded-xl shadow-2xl border border-line transform translate-x-full transition-transform duration-300 ease-out flex gap-3 items-start relative overflow-hidden';
    toast.innerHTML = `
      <div class="absolute left-0 top-0 bottom-0 w-1 bg-brand-500"></div>
      <div class="w-8 h-8 rounded-full bg-brand-50 flex items-center justify-center flex-shrink-0 mt-0.5">
        <svg class="w-4 h-4 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      </div>
      <div>
        <h4 class="font-bold text-sm text-slate-900">${title}</h4>
        <p class="text-xs text-slate-500 font-mono mt-1 leading-relaxed">${message}</p>
      </div>
    `;
    document.getElementById('toast-container').appendChild(toast);
    requestAnimationFrame(() => toast.classList.remove('translate-x-full'));
    setTimeout(() => {
      toast.classList.add('translate-x-full');
      setTimeout(() => toast.remove(), 300);
    }, 4000);
  }

  function initCharts() {
    const tCtx = document.getElementById('trainingChart').getContext('2d');
    trainChartInstance = new Chart(tCtx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'Accuracy',
          data: [],
          borderColor: '#2F5FFF',
          backgroundColor: 'rgba(47, 95, 255, 0.1)',
          borderWidth: 2,
          fill: true,
          tension: 0.4,
          pointRadius: 0
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { display: false },
          y: { min: 0, max: 1, display: false }
        }
      }
    });

    const dCtx = document.getElementById('donutChart').getContext('2d');
    donutChartInstance = new Chart(dCtx, {
      type: 'doughnut',
      data: {
        labels: [],
        datasets: [{
          data: [],
          backgroundColor: ['#2F5FFF', '#22D3EE', '#F5A623', '#F43F5E'],
          borderWidth: 0,
          cutout: '75%'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { animateScale: true, animateRotate: true, duration: 400 },
        plugins: { legend: { display: false }, tooltip: { enabled: false } }
      }
    });
  }

  function toggleCmdPalette() {
    if (cmdPalette.classList.contains('hidden')) {
      cmdPalette.classList.remove('hidden');
      requestAnimationFrame(() => {
        cmdPalette.classList.remove('opacity-0');
        cmdBox.classList.remove('scale-95');
        cmdInput.focus();
      });
    } else {
      cmdPalette.classList.add('opacity-0');
      cmdBox.classList.add('scale-95');
      setTimeout(() => cmdPalette.classList.add('hidden'), 200);
    }
  }

  engineToggle.addEventListener('change', (e) => {
    isEngineRunning = e.target.checked;
    
    webcamBtn.disabled = !isEngineRunning;
    uploadBtn.disabled = !isEngineRunning;
    driveBtn.disabled = !isEngineRunning;

    if (isEngineRunning) {
      engineStatusText.textContent = 'ON';
      engineStatusText.className = 'font-mono text-[10px] text-brand-600 font-bold uppercase transition-colors';
      if(placeholder) placeholder.querySelector('span').textContent = 'Awaiting Source';
      logTerminal("AI Engine activated. Awaiting input source.");
    } else {
      engineStatusText.textContent = 'OFF';
      engineStatusText.className = 'font-mono text-[10px] text-slate-500 font-bold uppercase transition-colors';
      if (isWebcamActive) stopWebcam();
      if(canvas) canvas.classList.add("hidden");
      if(placeholder) {
        placeholder.classList.remove("hidden");
        placeholder.querySelector('span').textContent = 'Engine is Offline';
      }
      logTerminal("AI Engine deactivated. Connections halted.");
    }
  });

  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      toggleCmdPalette();
    }
    if (e.key === 'Escape' && !cmdPalette.classList.contains('hidden')) {
      toggleCmdPalette();
    }
    if (e.key === ' ' && document.activeElement.tagName !== 'INPUT' && isEngineRunning) {
      e.preventDefault();
      webcamBtn.click();
    }
    if (e.key.toLowerCase() === 'u' && document.activeElement.tagName !== 'INPUT' && isEngineRunning) {
      e.preventDefault();
      uploadBtn.click();
    }
  });

  async function init() {
    attachRipples();
    attachTilt();
    initCharts();
    try {
      model = await tmPose.load(URL + "model.json", URL + "metadata.json");
      maxPredictions = model.getTotalClasses();
      labelContainer = document.getElementById("label-container");
      
      const initialData = [];
      for (let i = 0; i < maxPredictions; i++) {
        classNames.push("Class " + (i+1));
        initialData.push(100 / maxPredictions);
        
        const wrapper = document.createElement("div");
        const header = document.createElement("div");
        header.className = "flex justify-between items-baseline mb-1.5";
        
        const label = document.createElement("span");
        label.id = `label-${i}`;
        label.className = "font-mono text-[11px] font-bold text-slate-600 uppercase tracking-wide";
        
        const percent = document.createElement("span");
        percent.id = `percent-${i}`;
        percent.className = "font-mono text-sm font-bold text-slate-800";
        percent.textContent = "0%";
        
        header.appendChild(label);
        header.appendChild(percent);
        
        const track = document.createElement("div");
        track.className = "w-full bg-slate-100 h-2.5 rounded-full overflow-hidden";
        
        const bar = document.createElement("div");
        bar.id = `bar-${i}`;
        const colors = ['bg-brand-500', 'bg-cyan-400', 'bg-signal-amber', 'bg-signal-rose'];
        bar.className = `h-full w-0 transition-all duration-300 ease-out ${colors[i % colors.length]}`;
        
        track.appendChild(bar);
        wrapper.appendChild(header);
        wrapper.appendChild(track);
        labelContainer.appendChild(wrapper);
      }

      donutChartInstance.data.labels = classNames;
      donutChartInstance.data.datasets[0].data = initialData;
      donutChartInstance.update();

      statusBadge.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-emerald-500 pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>system_ready';
      statusBadge.className = "bg-emerald-50 text-emerald-700 font-mono text-xs font-bold px-4 py-1.5 rounded-full flex items-center gap-2 border border-emerald-100 transition-all shadow-sm";
      logTerminal("AI Core loaded successfully. Model classes: " + maxPredictions);

      gapi.load('client:picker', initGoogleApi);
    } catch (error) {
      statusBadge.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.8)]"></span>model_not_found';
      statusBadge.className = "bg-rose-50 text-rose-700 font-mono text-xs font-bold px-4 py-1.5 rounded-full flex items-center gap-2 border border-rose-100 transition-all shadow-sm";
      logTerminal("FATAL: Cannot find model files in /my_model/");
    }
  }

  function initGoogleApi() {
    gapi.client.init({
      developerKey: developerKey,
      discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
    });
  }

  driveBtn.addEventListener("click", () => {
    if (!isEngineRunning) return;
    if (isWebcamActive) stopWebcam();
    const tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: scope.join(' '),
      callback: (response) => {
        if (response.error !== undefined) {
          logTerminal("ERROR: Google Auth failed.");
          return;
        }
        oauthToken = response.access_token;
        createPicker();
      },
    });
    tokenClient.requestAccessToken({ prompt: 'consent' });
  });

  function createPicker() {
    const view = new google.picker.View(google.picker.ViewId.DOCS_IMAGES);
    const picker = new google.picker.PickerBuilder()
      .enableFeature(google.picker.Feature.NAV_HIDDEN)
      .setAppId(appId)
      .setOAuthToken(oauthToken)
      .addView(view)
      .setDeveloperKey(developerKey)
      .setCallback(pickerCallback)
      .build();
    picker.setVisible(true);
  }

  function pickerCallback(data) {
    if (data.action == google.picker.Action.PICKED) {
      const doc = data.docs[0];
      logTerminal(`Drive file selected: ${doc.name}`);
      if (skeletonLoader) skeletonLoader.classList.remove("hidden");
      fetch(`https://www.googleapis.com/drive/v3/files/${doc.id}?alt=media`, {
        headers: { 'Authorization': 'Bearer ' + oauthToken }
      })
      .then(response => response.blob())
      .then(blob => {
        const img = new Image();
        img.onload = () => processInputImage(img);
        img.src = window.URL.createObjectURL(blob);
      })
      .catch(() => logTerminal("ERROR: Fetch failed."));
    }
  }

  uploadBtn.addEventListener("click", () => {
    if (!isEngineRunning) return;
    if (isWebcamActive) stopWebcam();
    document.getElementById("image-upload").click();
  });

  document.getElementById("image-upload").addEventListener("change", (event) => {
    const file = event.target.files[0];
    if (file) {
      if (skeletonLoader) skeletonLoader.classList.remove("hidden");
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => processInputImage(img);
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
  });

  function processInputImage(img) {
    if (skeletonLoader) skeletonLoader.classList.add("hidden");
    if (placeholder) placeholder.classList.add("hidden");
    if (video) video.classList.add("hidden");
    if (canvas) canvas.classList.remove("hidden");

    if (!canvas) {
      logTerminal("ERROR: Canvas element is missing.");
      return;
    }

    const size = Math.min(img.width, img.height);
    canvas.width = size;
    canvas.height = size;
    ctx = canvas.getContext("2d");
    const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
    const x = (canvas.width / 2) - (img.width / 2) * scale;
    const y = (canvas.height / 2) - (img.height / 2) * scale;
    ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
    predict(canvas);
    logTerminal("Image processed & predicted.");
  }

  webcamBtn.addEventListener("click", async () => {
    if (!isEngineRunning) return;
    if (isWebcamActive) {
      stopWebcam();
    } else {
      if (skeletonLoader) skeletonLoader.classList.remove("hidden");
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        
        if (!video || !canvas) {
          logTerminal("ERROR: Video or Canvas element is missing.");
          return;
        }

        video.srcObject = stream;
        if (placeholder) placeholder.classList.add("hidden");
        video.classList.remove("hidden");
        canvas.classList.remove("hidden");
        isWebcamActive = true;
        
        webcamBtn.innerHTML = "Stop (Spc)";
        webcamBtn.className = "bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold py-3.5 rounded-xl transition-colors duration-200 text-sm border border-rose-100 relative overflow-hidden btn-ripple shadow-sm";
        attachRipples();
        
        video.onloadedmetadata = () => {
          if (skeletonLoader) skeletonLoader.classList.add("hidden");
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx = canvas.getContext("2d");
          loopWebcam();
        };
        logTerminal("Webcam stream started.");
      } catch (err) {
        if (skeletonLoader) skeletonLoader.classList.add("hidden");
        logTerminal("ERROR: Camera access denied or unavailable.");
      }
    }
  });

  function stopWebcam() {
    if (video && video.srcObject) {
      video.srcObject.getTracks().forEach(track => track.stop());
    }
    isWebcamActive = false;
    if (video) video.classList.add("hidden");
    
    webcamBtn.innerHTML = "Webcam (Spc)";
    webcamBtn.className = "bg-brand-50 hover:bg-brand-100 text-brand-600 font-bold py-3.5 rounded-xl transition-colors duration-200 text-sm border border-brand-100 relative overflow-hidden btn-ripple shadow-sm";
    attachRipples();
    logTerminal("Webcam stream stopped.");
  }

  async function loopWebcam() {
    if (isWebcamActive && isEngineRunning) {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      await predict(canvas);
      window.requestAnimationFrame(loopWebcam);
    }
  }

  async function predict(imageElement) {
    if(!model || !isEngineRunning) return;
    const { pose, posenetOutput } = await model.estimatePose(imageElement);
    const prediction = await model.predict(posenetOutput);
    let highestProb = 0;
    let detectedClass = "";
    const newDonutData = [];

    for (let i = 0; i < maxPredictions; i++) {
      const classPrediction = prediction[i].className;
      const probability = Math.round(prediction[i].probability * 100);
      classNames[i] = classPrediction;
      newDonutData.push(probability);
      
      const labelEl = document.getElementById(`label-${i}`);
      const percentEl = document.getElementById(`percent-${i}`);
      const barEl = document.getElementById(`bar-${i}`);

      if (labelEl) labelEl.textContent = classPrediction;
      if (percentEl) percentEl.textContent = probability + "%";
      if (barEl) barEl.style.width = probability + "%";
      
      if (probability > highestProb) {
        highestProb = probability;
        detectedClass = classPrediction;
      }
    }

    if (donutChartInstance) {
      donutChartInstance.data.labels = classNames;
      donutChartInstance.data.datasets[0].data = newDonutData;
      donutChartInstance.update();
    }
    if (topProbEl) topProbEl.textContent = highestProb + "%";

    if (pose && ctx) {
      tmPose.drawKeypoints(pose.keypoints, 0.6, ctx);
      tmPose.drawSkeleton(pose.keypoints, 0.6, ctx);
    }
    handlePoseProjectTrigger(detectedClass, highestProb);
  }

  function handlePoseProjectTrigger(className, probability) {
    if (probability >= 90) {
      const now = Date.now();
      if (now - lastLogTime > 4000) {
        lastLogTime = now;
        logTerminal(`<span class="text-white bg-amber-500/20 px-1 rounded">[DETECTED]</span> <span class="font-bold text-white">${className}</span> at ${probability}%. Executing Pose Project payload...`);
        showToast("High Confidence Match", `Detected <b>${className}</b> (${probability}%). Signal payload executed.`);
        playAlertSound();
        const formData = new FormData();
        formData.append('kelas', className);
        formData.append('akurasi', probability);
        fetch('api.php', { method: 'POST', body: formData })
        .catch(err => logTerminal(`<span class="text-rose-400">[NETWORK]</span> API unreachable (Running local mode).`));
      }
    }
  }

  function logTerminal(message) {
    if (!terminalLog) return;
    const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
    const log = document.createElement("div");
    log.className = "flex gap-3 hover:bg-white/5 px-2 py-1 rounded transition-colors";
    log.innerHTML = `<span class="text-slate-500 flex-shrink-0">[${time}]</span> <span class="break-words">${message}</span>`;
    terminalLog.appendChild(log);
    terminalLog.scrollTop = terminalLog.scrollHeight;
  }

  const epochsInput = document.getElementById("epochs-input");
  const epochsValue = document.getElementById("epochs-value");
  if (epochsInput && epochsValue) {
    epochsInput.addEventListener("input", () => {
      epochsValue.textContent = epochsInput.value;
    });
  }

  const trainBtn = document.getElementById("train-btn");
  if (trainBtn) {
    trainBtn.addEventListener("click", () => {
      const txt = document.getElementById("train-text");
      if(trainBtn.disabled) return;
      
      trainBtn.disabled = true;
      trainBtn.classList.add("opacity-75", "cursor-wait");
      if (txt) txt.textContent = "Training in progress...";
      
      const epochs = epochsInput ? parseInt(epochsInput.value) : 50;
      const batchSelect = document.getElementById("batch-select");
      const lrSelect = document.getElementById("lr-select");
      const batch = batchSelect ? batchSelect.value : 16;
      const lr = lrSelect ? lrSelect.value : 0.001;
      
      logTerminal(`<span class="text-cyan-300">[TRAIN]</span> Init config: epochs=${epochs}, batch=${batch}, lr=${lr}`);
      
      if (trainChartInstance) {
        trainChartInstance.data.labels = [];
        trainChartInstance.data.datasets[0].data = [];
      }
      
      let currentEpoch = 0;
      const interval = setInterval(() => {
        currentEpoch += Math.max(1, Math.floor(epochs / 20));
        if (currentEpoch >= epochs) currentEpoch = epochs;
        
        const acc = 1 - Math.exp(-currentEpoch / (epochs * 0.3)) + (Math.random() * 0.05);
        if (trainChartInstance) {
          trainChartInstance.data.labels.push(currentEpoch);
          trainChartInstance.data.datasets[0].data.push(Math.min(acc, 0.99));
          trainChartInstance.update();
        }
        
        if (currentEpoch >= epochs) {
          clearInterval(interval);
          trainBtn.disabled = false;
          trainBtn.classList.remove("opacity-75", "cursor-wait");
          if (txt) txt.textContent = "Run Simulation";
          logTerminal(`<span class="text-emerald-400 font-bold">[SUCCESS]</span> Training simulation completed. Model optimized.`);
          showToast("Training Complete", `Achieved ${(acc*100).toFixed(1)}% accuracy over ${epochs} epochs.`);
        }
      }, 150);
    });
  }

  window.onload = () => {
    setTimeout(init, 100);
  };
</script>
